<style>
  :root{--bg:#0a0f14;--card:#111c25;--line:rgba(255,255,255,.09);--ink:#eaf3f5;--muted:#8fa3ad;--teal:#2dd4bf;--grad:linear-gradient(115deg,#22d3ee 0%,#2dd4bf 55%,#0fb6a3 100%)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
  body:before{content:"";position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(closest-side,rgba(45,212,191,.15),transparent 70%);pointer-events:none}
  .box{position:relative;max-width:500px}
  .code{font-family:'Sora';font-size:clamp(80px,15vw,120px);font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;margin-bottom:12px}
  h1{font-family:'Sora';font-size:clamp(22px,4vw,30px);font-weight:800;margin-bottom:14px}
  p{color:var(--muted);font-size:16.5px;margin-bottom:30px;line-height:1.65}
  .btn{display:inline-flex;align-items:center;gap:9px;font-weight:600;font-size:15.5px;padding:14px 25px;border-radius:12px;cursor:pointer;border:0;font-family:inherit;text-decoration:none;transition:transform .16s}
  .btn-primary{background:var(--grad);color:#04201d;box-shadow:0 14px 32px -10px rgba(45,212,191,.55)}
  .btn-primary:hover{transform:translateY(-2px)}
  .links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .link-item{color:var(--teal);font-size:14.5px;font-weight:600;border:1px solid rgba(45,212,191,.3);padding:9px 16px;border-radius:999px;transition:background .15s}
  .link-item:hover{background:rgba(45,212,191,.12)}
</style>
</head>
<body>
<div class="box">
  <div class="code">404</div>
  <h1>Esta página no existe</h1>
